    <!-- left pea -->
    <circle cx="-8" cy="4" r="12" fill="#a8e06c"/>
    <circle cx="-11" cy="2" r="1.5" fill="#333"/>
    <circle cx="-5" cy="2" r="1.5" fill="#333"/>
