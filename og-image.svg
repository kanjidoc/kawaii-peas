  <text x="600" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" fill="#7ec850" font-weight="bold">Kawaii Peas</text>
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#bbb">tap them to make them kiss!</text>
