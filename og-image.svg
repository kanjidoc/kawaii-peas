    <ellipse cx="-3" cy="5" rx="2.5" ry="1.5" fill="rgba(255,130,130,0.45)"/>
    <path d="M-10 7 Q-8 9 -6 7" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>
